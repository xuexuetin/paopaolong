<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="泡泡乐">
<meta name="theme-color" content="#ffd6e8">
<title>泡泡乐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    background: linear-gradient(160deg, #ffe3f1 0%, #e3f0ff 100%);
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  #app {
    position: relative;
    width: 100%;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
  }
  /* 顶部状态栏 */
  #hud {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: env(safe-area-inset-top, 12px) 20px 10px;
    font-size: 22px; font-weight: 700; color: #d6336c;
    z-index: 5; pointer-events: none;
  }
  /* 开始 / 结束 遮罩 */
  .overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px; text-align: center;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(6px);
  }
  .overlay h1 { font-size: 44px; color: #d6336c; }
  .overlay p { font-size: 20px; color: #868e96; }
  .btn {
    font-size: 26px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #ff8fab, #ff6b9d);
    border: none; border-radius: 999px;
    padding: 16px 48px;
    box-shadow: 0 8px 20px rgba(255,107,157,0.4);
    cursor: pointer;
  }
  .btn:active { transform: scale(0.96); }
  /* 泡泡 */
  .bubble {
    position: absolute;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    box-shadow: inset -6px -6px 12px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.1);
    cursor: pointer;
    will-change: transform;
  }
  .hidden { display: none !important; }
  #finalScore { font-size: 64px; color: #f783ac; font-weight: 800; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div>⭐ <span id="score">0</span></div>
    <div>⏱ <span id="time">30</span></div>
  </div>

  <div id="startScreen" class="overlay">
    <h1>🫧 泡泡乐</h1>
    <p>点破泡泡得分，30 秒挑战！</p>
    <button class="btn" id="startBtn">开始玩</button>
  </div>

  <div id="endScreen" class="overlay hidden">
    <h1>🎉 时间到！</h1>
    <div id="finalScore">0</div>
    <p>你真棒！</p>
    <button class="btn" id="againBtn">再玩一次</button>
  </div>
</div>

<script>
(function () {
  const app = document.getElementById('app');
  const scoreEl = document.getElementById('score');
  const timeEl = document.getElementById('time');
  const startScreen = document.getElementById('startScreen');
  const endScreen = document.getElementById('endScreen');
  const finalScore = document.getElementById('finalScore');
  const startBtn = document.getElementById('startBtn');
  const againBtn = document.getElementById('againBtn');

  const COLORS = ['#ff8fab','#ffd43b','#69db7c','#74c0fc','#b197fc','#ffa94d'];
  const EMOJIS = ['🐱','⭐','🌈','🍎','🚀','🌸','🐰','🍉'];
  const GAME_TIME = 30;
  let score = 0, timeLeft = GAME_TIME, timerId = null, spawnId = null;

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.value = 660; g.gain.value = 0.08;
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.08);
    } catch (e) {}
  }

  function spawnBubble() {
    const size = 56 + Math.random() * 40;
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
    const maxX = app.clientWidth - size;
    const maxY = app.clientHeight - size - 80;
    const x = Math.random() * maxX;
    const y = Math.random() * maxY + 60;
    b.style.left = x + 'px';
    b.style.top = y + 'px';
    b.textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];

    let popped = false;
    const life = 1200 + Math.random() * 900;
    const t1 = setTimeout(() => { if (!popped) remove(); }, life);

    b.addEventListener('touchstart', pop, { passive: true });
    b.addEventListener('mousedown', pop);

    function pop(e) {
      if (popped) return;
      popped = true;
      clearTimeout(t1);
      score++; scoreEl.textContent = score;
      beep();
      b.style.transition = 'transform .15s, opacity .15s';
      b.style.transform = 'scale(1.6)';
      b.style.opacity = '0';
      setTimeout(remove, 160);
    }
    function remove() { if (b.parentNode) b.parentNode.removeChild(b); }

    app.appendChild(b);
  }

  function startGame() {
    score = 0; timeLeft = GAME_TIME;
    scoreEl.textContent = '0'; timeEl.textContent = GAME_TIME;
    startScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    spawnId = setInterval(spawnBubble, 550);
    spawnBubble();
    timerId = setInterval(() => {
      timeLeft--;
      timeEl.textContent = timeLeft;
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  function endGame() {
    clearInterval(timerId);
    clearInterval(spawnId);
    document.querySelectorAll('.bubble').forEach(b => b.remove());
    finalScore.textContent = score;
    endScreen.classList.remove('hidden');
  }

  startBtn.addEventListener('click', startGame);
  againBtn.addEventListener('click', startGame);
})();
</script>
</body>
</html>
